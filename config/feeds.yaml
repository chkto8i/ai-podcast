# AI Podcast Digest — Feed-Konfiguration
# Hier die 7 Stammshows eintragen.
# Format: name + rss_url

feeds:
  - name: "Lex Fridman Podcast"
    rss_url: "https://lexfridman.com/feed/podcast/"

  - name: "The TWIML AI Podcast"
    rss_url: "https://twimlai.com/feed/podcast/"

  - name: "KI Update Heise"
    rss_url: "https://kiupdate.podigee.io/feed/mp3"

  - name: "Das KI-Kochbuch"
    rss_url: "https://api.riverside.fm/hosting/SLGJyCES.rss"

  - name: "KI verstehen - Deutschlandfunk"
    rss_url: "https://www.deutschlandfunk.de/ki-verstehen-102.xml"

  - name: "KI-Podcast ARD"
    rss_url: "https://feeds.br.de/der-ki-podcast/feed.xml"


# Ausgabe-Einstellungen
output:
  episode_title_prefix: "Weekly AI Digest"
  max_summary_length: 3000       # Zeichen pro Show-Zusammenfassung
  tts_voice: "onyx"              # OpenAI TTS Stimme: alloy, echo, fable, onyx, nova, shimmer
  intro_pause_ms: 800            # Pause zwischen Shows in Millisekunden
  language: "de"                 # Sprache für Zusammenfassungen: de / en
