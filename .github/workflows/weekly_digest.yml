name: Weekly AI Podcast Digest

on:
  schedule:
    # Jeden Montag um 05:00 Uhr UTC (= 06:00 Uhr MEZ / 07:00 Uhr MESZ)
    - cron: '0 5 * * 1'
  workflow_dispatch:
    # Manuell auslösbar über GitHub UI (für Tests)

# Erlaubt dem Workflow, Dateien ins Repository zu committen (für RSS-Feed)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: System-Abhängigkeiten installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Python-Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Digest erstellen
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/digest.py

      - name: MP3 als Artifact hochladen (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: podcast-digest-${{ github.run_id }}
          path: output/*.mp3
          retention-days: 30

      - name: docs/ committen und pushen (RSS-Feed + MP3)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🎙️ Weekly Digest $(date +'%Y-%m-%d')"
          git push

      - name: Job-Summary ausgeben
        run: |
          echo "## 🎙️ AI Podcast Digest" >> $GITHUB_STEP_SUMMARY
          if [ -f output/latest_meta.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat output/latest_meta.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            RSS_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/feed.xml"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**RSS-Feed:** $RSS_URL" >> $GITHUB_STEP_SUMMARY
          fi
